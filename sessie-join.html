<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samen Schrijven — Meedoen | Depeterpost Verhalen Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #f0f0ff;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        h1, h2 { font-family: 'Fredoka One', cursive; }

        .scherm { display: none; width: 100%; max-width: 480px; }
        .scherm.actief { display: block; }

        /* ── Kaart ── */
        .kaart {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 40px 36px;
            border: 1px solid #2a2a3e;
            text-align: center;
        }

        .icoon { font-size: 52px; margin-bottom: 12px; }
        .kaart h1 { font-size: 30px; color: #a78bfa; margin-bottom: 6px; }
        .kaart .subtitel { color: #888; font-size: 15px; margin-bottom: 28px; }

        /* ── Formulier ── */
        .veld-groep { text-align: left; margin-bottom: 18px; }
        label { display: block; font-weight: 700; color: #c4b5fd; font-size: 14px; margin-bottom: 6px; }

        input[type=text] {
            width: 100%;
            background: #0f0f1a;
            border: 2px solid #333;
            border-radius: 12px;
            color: #f0f0ff;
            padding: 13px 16px;
            font-size: 17px;
            font-family: 'Nunito', sans-serif;
            transition: border-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        input[type=text]#naam {
            text-transform: none;
            letter-spacing: normal;
        }
        input[type=text]:focus { outline: none; border-color: #7c3aed; }

        .knop {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7c3aed, #e8197d);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 20px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .knop:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .knop:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ── Meldingen ── */
        .melding {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 14px;
        }
        .melding.fout   { background: #3b0a0a; color: #fca5a5; }
        .melding.info   { background: #1e3a5f; color: #93c5fd; }
        .melding.succes { background: #064e3b; color: #6ee7b7; }

        /* ── Wachtscherm ── */
        .hoofd-badge {
            background: linear-gradient(135deg, #7c3aed, #e8197d);
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 28px;
        }
        .hoofd-badge .label { font-size: 14px; color: rgba(255,255,255,0.75); margin-bottom: 4px; }
        .hoofd-badge .naam  { font-family: 'Fredoka One', cursive; font-size: 32px; color: white; }
        .hoofd-badge .hst   { font-size: 16px; color: rgba(255,255,255,0.8); margin-top: 4px; }

        .wacht-tekst {
            font-family: 'Fredoka One', cursive;
            font-size: 22px;
            color: #a78bfa;
            margin-bottom: 6px;
        }
        .wacht-sub { color: #888; font-size: 14px; margin-bottom: 24px; }

        /* ── Deelnemers lijst ── */
        .deelnemers-lijst { text-align: left; margin-bottom: 24px; }
        .deelnemers-lijst h3 {
            font-size: 13px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .deelnemer-rij {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #0f0f1a;
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1px solid #2a2a3e;
            transition: border-color 0.3s;
        }
        .deelnemer-rij.zelf { border-color: #7c3aed; background: #1a0f3e; }
        .deelnemer-rij .rij-icoon { font-size: 18px; }
        .deelnemer-rij .rij-naam  { font-weight: 700; flex: 1; }
        .deelnemer-rij .rij-hst   { font-size: 12px; color: #888; }
        .deelnemer-rij .rij-tag   { font-size: 11px; color: #7c3aed; font-weight: 700; background: #2d1b69; padding: 2px 8px; border-radius: 20px; }

        /* ── Voortgang dots ── */
        .wacht-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #333;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.7); background: #333; }
            40%            { transform: scale(1.1); background: #7c3aed; }
        }

        /* ── Startscherm ── */
        .start-animatie { font-size: 72px; animation: popIn 0.5s ease; margin-bottom: 16px; }
        @keyframes popIn {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        .opdracht-blok {
            background: #0f0f1a;
            border: 2px solid #7c3aed;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            margin: 20px 0;
        }
        .opdracht-blok .ob-label { font-size: 12px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .opdracht-blok .ob-tekst { font-size: 16px; line-height: 1.5; color: #e0e0ff; }

        .sw-lijst { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .sw-chip {
            background: #2d1b69;
            color: #c4b5fd;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 700;
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ══════════════════════════════════
     SCHERM 1: Inloggen
══════════════════════════════════ -->
<div id="scherm-login" class="scherm actief">
    <div class="kaart">
        <div class="icoon">✍️</div>
        <h1>Samen Schrijven</h1>
        <p class="subtitel">Vul de code van je juf of meester in</p>

        <div id="login-melding"></div>

        <div class="veld-groep">
            <label for="code">Sessie-code (6 tekens)</label>
            <input type="text" id="code" maxlength="6" placeholder="bijv. XK7P2Q"
                   oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
        </div>

        <div class="veld-groep">
            <label for="naam">Jouw naam</label>
            <input type="text" id="naam" maxlength="30" placeholder="bijv. Emma"
                   onkeydown="if(event.key==='Enter') joinSessie()">
        </div>

        <button class="knop" onclick="joinSessie()">🚀 Meedoen!</button>
    </div>
</div>

<!-- ══════════════════════════════════
     SCHERM 2: Wachten
══════════════════════════════════ -->
<div id="scherm-wacht" class="scherm">
    <div class="kaart">
        <div class="hoofd-badge">
            <div class="label">Jij schrijft</div>
            <div class="naam" id="wacht-naam"></div>
            <div class="hst" id="wacht-hst"></div>
        </div>

        <div class="wacht-tekst">Wachten op de start...</div>
        <div class="wacht-sub">Je juf of meester start het verhaal als iedereen er is.</div>

        <div class="wacht-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="deelnemers-lijst">
            <h3>In de sessie (<span id="wacht-teller">0</span> / <span id="wacht-totaal">0</span>)</h3>
            <div id="wacht-lijst"></div>
        </div>

        <div id="wacht-melding"></div>
    </div>
</div>

<!-- ══════════════════════════════════
     SCHERM 3: Start! (doorsturen)
══════════════════════════════════ -->
<div id="scherm-start" class="scherm">
    <div class="kaart">
        <div class="start-animatie">🚀</div>
        <h1 style="font-size:28px;color:#10b981;margin-bottom:8px;">Het begint!</h1>
        <p style="color:#888;margin-bottom:20px;">Je wordt doorgestuurd naar jouw schrijfpagina...</p>

        <div class="opdracht-blok" id="start-opdracht-blok" style="display:none;">
            <div class="ob-label">Jouw hoofdstuk</div>
            <div class="ob-tekst" id="start-opdracht-tekst"></div>
            <div class="sw-lijst" id="start-sw"></div>
        </div>

        <div style="margin-top:16px;color:#888;font-size:14px;">
            <span class="spinner"></span> Even geduld...
        </div>
    </div>
</div>

<script>
    let sessiecode       = null;
    let mijnNaam         = null;
    let mijnHoofdstuk    = null;
    let pollingInterval  = null;
    let eventSource      = null;

    // ── Scherm wisselen ──
    function toonScherm(id) {
        document.querySelectorAll('.scherm').forEach(s => s.classList.remove('actief'));
        document.getElementById(id).classList.add('actief');
    }

    function toonMelding(elId, html, type = 'info') {
        document.getElementById(elId).innerHTML = html
            ? `<div class="melding ${type}">${html}</div>`
            : '';
    }

    // ── URL params lezen (bijv. via QR-link) ──
    (function laadUrlParams() {
        const p = new URLSearchParams(location.search);
        if (p.get('code')) {
            const input = document.getElementById('code');
            input.value = p.get('code').toUpperCase();
        }
    })();

    // ── Sessie joinen ──
    async function joinSessie() {
        const codeInput = document.getElementById('code');
        const naamInput = document.getElementById('naam');
        const code = codeInput.value.trim().toUpperCase();
        const naam = naamInput.value.trim();

        toonMelding('login-melding', '');

        if (code.length !== 6) {
            toonMelding('login-melding', 'Vul een code in van 6 tekens.', 'fout');
            return;
        }
        if (naam.length < 2) {
            toonMelding('login-melding', 'Vul je naam in (minimaal 2 letters).', 'fout');
            naamInput.focus();
            return;
        }

        toonMelding('login-melding', '<span class="spinner"></span> Verbinden...', 'info');

        try {
            const resp = await fetch(`/api/sessie/${code}/join`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ naam })
            });
            const data = await resp.json();

            if (!data.succes) {
                toonMelding('login-melding', data.bericht, 'fout');
                return;
            }

            sessiecode    = code;
            mijnNaam      = naam;
            mijnHoofdstuk = data.hoofdstukNummer;

            // Sla op in sessionStorage zodat schrijfpagina het weet
            sessionStorage.setItem('samenNaam',      mijnNaam);
            sessionStorage.setItem('samenHoofdstuk', mijnHoofdstuk);
            sessionStorage.setItem('samenCode',      sessiecode);

            vulWachtScherm(data.sessie);
            toonScherm('scherm-wacht');
            verbindSSE();

        } catch (_) {
            toonMelding('login-melding', 'Verbindingsfout. Controleer je internet en probeer opnieuw.', 'fout');
        }
    }

    // ── Wachtscherm vullen ──
    function vulWachtScherm(sessie) {
        document.getElementById('wacht-naam').textContent = mijnNaam;
        document.getElementById('wacht-hst').textContent  =
            `Hoofdstuk ${mijnHoofdstuk} van ${sessie.aantalDeelnemers}`;
        bijwerkWachtLijst(sessie);
    }

    function bijwerkWachtLijst(sessie) {
        document.getElementById('wacht-teller').textContent = sessie.deelnemers.length;
        document.getElementById('wacht-totaal').textContent = sessie.aantalDeelnemers;

        const lijst = document.getElementById('wacht-lijst');
        lijst.innerHTML = '';

        sessie.deelnemers.forEach(d => {
            const isZelf = d.naam.toLowerCase() === mijnNaam.toLowerCase();
            const el = document.createElement('div');
            el.className = `deelnemer-rij${isZelf ? ' zelf' : ''}`;
            el.innerHTML = `
                <span class="rij-icoon">${isZelf ? '⭐' : '✅'}</span>
                <span class="rij-naam">${d.naam}</span>
                <span class="rij-hst">H${d.hoofdstukNummer}</span>
                ${isZelf ? '<span class="rij-tag">jij</span>' : ''}
            `;
            lijst.appendChild(el);
        });

        // Lege plekken tonen
        for (let i = sessie.deelnemers.length; i < sessie.aantalDeelnemers; i++) {
            const el = document.createElement('div');
            el.className = 'deelnemer-rij';
            el.style.opacity = '0.35';
            el.innerHTML = `
                <span class="rij-icoon">⬜</span>
                <span class="rij-naam" style="color:#555">Wacht nog...</span>
                <span class="rij-hst">H${i + 1}</span>
            `;
            lijst.appendChild(el);
        }
    }

    // ── SSE verbinding ──
    function verbindSSE() {
        if (eventSource) return;
        eventSource = new EventSource(`/api/sessie/${sessiecode}/status-stream`);

        eventSource.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                if (data.type !== 'staat') return;
                const sessie = data.sessie;
                if (sessie.status === 'wachten') {
                    bijwerkWachtLijst(sessie);
                } else {
                    stopVerbinding();
                    toonStartScherm(sessie);
                }
            } catch (_) {}
        };

        eventSource.onerror = () => {
            eventSource.close();
            eventSource = null;
            startPolling(); // fallback
        };
    }

    // ── Polling (fallback) ──
    function startPolling() {
        if (pollingInterval || eventSource) return;
        pollingInterval = setInterval(peilSessie, 2500);
    }

    function stopVerbinding() {
        if (eventSource)     { eventSource.close(); eventSource = null; }
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
    }

    async function peilSessie() {
        if (!sessiecode) return;
        try {
            const resp = await fetch(`/api/sessie/${sessiecode}`);
            const data = await resp.json();
            if (!data.succes) return;
            const sessie = data.sessie;
            if (sessie.status === 'wachten') {
                bijwerkWachtLijst(sessie);
            } else {
                stopVerbinding();
                toonStartScherm(sessie);
            }
        } catch (_) {}
    }

    // ── Startscherm + doorsturen ──
    function toonStartScherm(sessie) {
        toonScherm('scherm-start');

        // Toon de opdracht alvast als preview
        const bp  = sessie.blueprint;
        const hst = bp?.hoofdstukken?.find(h => h.nummer === mijnHoofdstuk);

        if (hst) {
            document.getElementById('start-opdracht-blok').style.display = 'block';
            document.getElementById('start-opdracht-tekst').textContent  = hst.opdracht || '';
            const swEl = document.getElementById('start-sw');
            swEl.innerHTML = (hst.sleutelwoorden || [])
                .map(w => `<span class="sw-chip">🔑 ${w}</span>`).join('');
        }

        // Na 2 seconden doorsturen
        setTimeout(() => {
            window.location.href =
                `sessie-schrijf.html?code=${sessiecode}&hoofdstuk=${mijnHoofdstuk}`;
        }, 2000);
    }
</script>
</body>
</html>
